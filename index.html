<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐷 Find Him</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700&display=swap');

  :root {
    --sky-left: #87CEEB;
    --sky-right: #3d1a6e;
    --ground-left: #5a8a3c;
    --ground-right: #2a1a4e;
    --pink: #ff9ec4;
    --pink-dark: #e06090;
    --red: #e03030;
    --dialogue-bg: rgba(255,255,255,0.92);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    overflow: hidden;
    background: #000;
    font-family: 'Press Start 2P', monospace;
    touch-action: manipulation;
    user-select: none;
  }

  #gameCanvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* ── Dialogue Box ── */
  #dialogue {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: min(92vw, 520px);
    background: var(--dialogue-bg);
    border: 3px solid #444;
    border-radius: 14px;
    padding: 16px 20px 14px;
    box-shadow: 4px 4px 0 #222, 0 0 0 1px #fff inset;
    z-index: 100;
    display: none;
  }

  #dialogue .speaker {
    font-size: 9px;
    color: var(--pink-dark);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  #dialogue .text {
    font-size: 11px;
    line-height: 1.9;
    color: #222;
    min-height: 44px;
  }

  #dialogue .continue-hint {
    font-size: 7px;
    color: #aaa;
    text-align: right;
    margin-top: 10px;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── End Screen ── */
  #endScreen {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(20,0,40,0.85);
    z-index: 200;
    gap: 0;
  }

  #endScreen .bubble {
    background: #fff;
    border: 3px solid #444;
    border-radius: 16px;
    padding: 24px 28px;
    width: min(88vw, 440px);
    box-shadow: 5px 5px 0 #222;
    text-align: center;
  }

  #endScreen .bubble .emo-name {
    font-size: 9px;
    color: #555;
    margin-bottom: 10px;
  }

  #endScreen .bubble .emo-text {
    font-size: 11px;
    line-height: 2;
    color: #111;
    min-height: 60px;
  }

  #endScreen .buttons {
    display: flex;
    gap: 16px;
    margin-top: 22px;
    justify-content: center;
    flex-wrap: wrap;
    position: relative;
  }

  .choice-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    padding: 12px 22px;
    border: 3px solid #222;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 4px 4px 0 #222;
    transition: transform .1s, box-shadow .1s;
    outline: none;
  }

  .choice-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #222; }

  #btnYes  { background: #ff9ec4; color: #6b0040; }
  #btnYes2 { background: #c8f5a0; color: #1a4a00; }

  #btnNo {
    background: #ccc;
    color: #555;
    position: absolute;
    font-size: 8px;
    padding: 8px 12px;
    pointer-events: none; /* will enable via JS */
    bottom: -44px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0.5;
    border-color: #aaa;
    box-shadow: 2px 2px 0 #aaa;
    z-index: 300;
  }

  /* ── Happy ending ── */
  #happyScreen {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #ffe0f0 0%, #e0d0ff 100%);
    z-index: 300;
    gap: 18px;
    text-align: center;
    padding: 20px;
  }

  #happyScreen .title {
    font-size: clamp(14px, 4vw, 22px);
    color: #c03070;
    text-shadow: 3px 3px 0 #fff;
    line-height: 1.8;
  }

  #happyScreen .hearts {
    font-size: 40px;
    animation: heartPop 0.6s ease infinite alternate;
  }

  @keyframes heartPop { from{transform:scale(1)} to{transform:scale(1.2)} }

  #happyScreen .subtitle {
    font-size: 9px;
    color: #805090;
    line-height: 2;
    max-width: 320px;
  }

  /* ── Mobile controls ── */
  #mobileControls {
    position: fixed;
    bottom: 100px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 50;
    pointer-events: none;
  }

  .mob-btn {
    width: 70px; height: 70px;
    background: rgba(255,255,255,0.25);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 50%;
    font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: all;
    cursor: pointer;
    backdrop-filter: blur(4px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    -webkit-tap-highlight-color: transparent;
  }

  .mob-btn:active { background: rgba(255,255,255,0.45); }

  /* hide mobile controls on desktop */
  @media (hover: hover) and (pointer: fine) {
    #mobileControls { display: none; }
  }

  /* ── Loading ── */
  #loading {
    position: fixed; inset: 0;
    background: #1a0a2e;
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    color: #ff9ec4;
    font-size: 13px;
    flex-direction: column;
    gap: 16px;
  }
  #loading .sub { font-size: 8px; color: #a080c0; }
</style>
</head>
<body>

<div id="loading">
  <div>🐷 FIND HIM</div>
  <div class="sub">tap or press → to move</div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="dialogue">
  <div class="speaker" id="dialogueSpeaker">Piggy</div>
  <div class="text" id="dialogueText"></div>
  <div class="continue-hint" id="continueHint">▼ tap to continue</div>
</div>

<div id="endScreen">
  <div class="bubble">
    <div class="emo-name">✦ Emo Guy ✦</div>
    <div class="emo-text" id="endText"></div>
    <div class="buttons" id="endButtons">
      <button class="choice-btn" id="btnYes" onclick="chooseYes()">YES! 💖</button>
      <button class="choice-btn" id="btnYes2" onclick="chooseYes()">HECK YES! 🌟</button>
      <button class="choice-btn" id="btnNo" id="btnNo">no...</button>
    </div>
  </div>
</div>

<div id="happyScreen">
  <div class="hearts">💕🐷☕💕</div>
  <div class="title">You said YES!!</div>
  <div class="subtitle">You and Emo Guy walk off together into the purple sunset... coffee awaits. 🌇</div>
</div>

<!-- Mobile controls -->
<div id="mobileControls">
  <div class="mob-btn" id="mobJump" ontouchstart="mobileJump()" onclick="mobileJump()">⬆️</div>
  <div class="mob-btn" id="mobRight" ontouchstart="mobileRight()" ontouchend="mobileRightEnd()" onclick="mobileRightOnce()">➡️</div>
</div>

<script>
// ════════════════════════════════════════════
//  GAME ENGINE
// ════════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H, GROUND_Y, SCALE;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W;
  canvas.height = H;
  GROUND_Y = H * 0.72;
  SCALE = Math.max(1, Math.floor(Math.min(W, H) / 180));
}
resize();
window.addEventListener('resize', resize);

// ── World ──
const WORLD_WIDTH = 4000;
let camX = 0;

// ── Piggy state ──
const pig = {
  x: 120, y: 0, vy: 0,
  onGround: true,
  walking: false,
  walkFrame: 0, walkTimer: 0,
  animPhase: 0,
  arrived: false
};

// ── Input ──
const keys = {};
let moveRight = false;
let jumpQueued = false;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'ArrowRight') moveRight = true;
  if ((e.code === 'Space' || e.code === 'ArrowUp') && pig.onGround && !pig.arrived) {
    jumpQueued = true;
  }
  if (e.code === 'Space' && dialogueVisible) advanceDialogue();
  e.preventDefault();
}, { passive: false });

document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'ArrowRight') moveRight = false;
});

// tap to advance dialogue
canvas.addEventListener('click', () => {
  if (dialogueVisible) advanceDialogue();
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (dialogueVisible) { advanceDialogue(); return; }
}, { passive: false });

function mobileJump() {
  if (pig.onGround && !pig.arrived) jumpQueued = true;
}
let mobileRightHeld = false;
function mobileRight() { mobileRightHeld = true; }
function mobileRightEnd() { mobileRightHeld = false; }
function mobileRightOnce() { moveRight = true; setTimeout(() => moveRight = false, 150); }

// ── Physics ──
const GRAVITY = 0.55;
const JUMP_VEL = -14;
const WALK_SPEED = 3.2;

// ── Scenes / dialogue ──
const scenes = [
  {
    triggerX: 0,
    speaker: "Piggy 🐷",
    lines: ["It's cold...", "I hope he's still waiting."]
  },
  {
    triggerX: 1400,
    speaker: "Piggy 🐷",
    lines: ["I'm almost there...", "Just over the hill."]
  },
  {
    triggerX: 2600,
    speaker: "Piggy 🐷",
    lines: ["The sky looks so pretty tonight..."]
  }
];
let sceneIdx = 0;
let dialogueVisible = false;
let dialogueLines = [];
let dialogueLineIdx = 0;
let dialogueSpeaker = '';
let typewriterTimer = null;
let typewriterFull = '';
let typewriterCurrent = '';
let typewriterDone = false;
let paused = false;

function showDialogue(speaker, lines) {
  dialogueSpeaker = speaker;
  dialogueLines = lines;
  dialogueLineIdx = 0;
  dialogueVisible = true;
  paused = true;
  startTypewriter(lines[0]);
  document.getElementById('dialogue').style.display = 'block';
  document.getElementById('dialogueSpeaker').textContent = speaker;
}

function startTypewriter(text) {
  typewriterFull = text;
  typewriterCurrent = '';
  typewriterDone = false;
  clearInterval(typewriterTimer);
  document.getElementById('continueHint').style.opacity = '0';
  typewriterTimer = setInterval(() => {
    if (typewriterCurrent.length < typewriterFull.length) {
      typewriterCurrent += typewriterFull[typewriterCurrent.length];
      document.getElementById('dialogueText').textContent = typewriterCurrent;
    } else {
      typewriterDone = true;
      clearInterval(typewriterTimer);
      document.getElementById('continueHint').style.opacity = '1';
    }
  }, 45);
}

function advanceDialogue() {
  if (!typewriterDone) {
    // skip typewriter
    clearInterval(typewriterTimer);
    typewriterCurrent = typewriterFull;
    document.getElementById('dialogueText').textContent = typewriterCurrent;
    typewriterDone = true;
    document.getElementById('continueHint').style.opacity = '1';
    return;
  }
  dialogueLineIdx++;
  if (dialogueLineIdx < dialogueLines.length) {
    startTypewriter(dialogueLines[dialogueLineIdx]);
  } else {
    // close dialogue
    dialogueVisible = false;
    paused = false;
    document.getElementById('dialogue').style.display = 'none';
  }
}

// ── End scene ──
function triggerEnd() {
  pig.arrived = true;
  paused = true;
  // Typewriter for end text
  const endLines = [
    "You made it.",
    "I was about to think you got lost in the cozy forest.",
    "Will you come get coffee with me?"
  ];
  const endScreen = document.getElementById('endScreen');
  endScreen.style.display = 'flex';
  const endEl = document.getElementById('endText');
  endEl.textContent = '';
  let full = endLines.join(' ');
  let idx = 0;
  const t = setInterval(() => {
    if (idx < full.length) {
      endEl.textContent += full[idx++];
    } else {
      clearInterval(t);
      // show buttons
      document.getElementById('endButtons').style.opacity = '1';
      // enable the sneaky No button
      setupNoButton();
    }
  }, 40);
  document.getElementById('endButtons').style.opacity = '0';
  document.getElementById('mobileControls').style.display = 'none';
}

function chooseYes() {
  document.getElementById('endScreen').style.display = 'none';
  document.getElementById('happyScreen').style.display = 'flex';
}

// ── Easter egg: No button that runs away ──
function setupNoButton() {
  const btn = document.getElementById('btnNo');
  btn.style.pointerEvents = 'all';
  const container = document.getElementById('endButtons');
  const rect = container.getBoundingClientRect();

  function flee(cx, cy) {
    const br = btn.getBoundingClientRect();
    const bx = br.left + br.width/2;
    const by = br.top + br.height/2;
    const dx = bx - cx;
    const dy = by - cy;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 120) {
      // run away
      const angle = Math.atan2(dy, dx);
      let nx = bx + Math.cos(angle) * 90;
      let ny = by + Math.sin(angle) * 90;
      nx = Math.max(10, Math.min(window.innerWidth - br.width - 10, nx - br.width/2));
      ny = Math.max(10, Math.min(window.innerHeight - br.height - 10, ny - br.height/2));
      btn.style.position = 'fixed';
      btn.style.left = nx + 'px';
      btn.style.top = ny + 'px';
      btn.style.bottom = 'auto';
      btn.style.transform = 'none';
    }
  }

  document.addEventListener('mousemove', e => flee(e.clientX, e.clientY));
  document.addEventListener('touchmove', e => {
    if (e.touches[0]) flee(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
}

// ── World objects ──
// Puddle position
const PUDDLE_X = 1800;
const EMO_X   = 3500;

// Tree positions (world coords)
const trees = [
  { x: 300,  h: 120, trunk: 18, leafColor: '#2d8040', deco: true },
  { x: 600,  h: 100, trunk: 14, leafColor: '#34a050' },
  { x: 950,  h: 140, trunk: 20, leafColor: '#267030', deco: true },
  { x: 1200, h: 90,  trunk: 12, leafColor: '#3ab060' },
  { x: 1600, h: 110, trunk: 16, leafColor: '#40806a' },
  { x: 2100, h: 120, trunk: 18, leafColor: '#3a5080' },
  { x: 2400, h: 130, trunk: 20, leafColor: '#2d3870' },
  { x: 2800, h: 100, trunk: 15, leafColor: '#3a2870' },
  { x: 3100, h: 90,  trunk: 13, leafColor: '#2a1a60' },
  { x: 3300, h: 110, trunk: 16, leafColor: '#1e1250', deco: true, emo: true }, // emo tree
];

// Clouds
const clouds = [
  { x: 200, y: 60, w: 110, speed: 0.12 },
  { x: 500, y: 40, w: 80,  speed: 0.08 },
  { x: 900, y: 70, w: 130, speed: 0.10 },
  { x: 1300,y: 50, w: 90,  speed: 0.09 },
  { x: 1900,y: 65, w: 100, speed: 0.07 },
  { x: 2500,y: 45, w: 120, speed: 0.06 },
  { x: 3000,y: 60, w: 85,  speed: 0.05 },
];

// Hills
const hills = [
  { x: 0,    w: 700,  h: 130, color: '#4a7a30' },
  { x: 500,  w: 600,  h: 100, color: '#3d6828' },
  { x: 1100, w: 800,  h: 140, color: '#3a6040' },
  { x: 1800, w: 700,  h: 120, color: '#364858' },
  { x: 2400, w: 900,  h: 150, color: '#2e3060' },
  { x: 3100, w: 800,  h: 130, color: '#231844' },
];

// Flowers
const flowers = [];
for (let i = 0; i < 60; i++) {
  flowers.push({
    x: Math.random() * 3400 + 100,
    y: Math.random() * 30,
    color: ['#ffaacc','#fff070','#ff7070','#aaffaa','#c8aaff'][Math.floor(Math.random()*5)],
    size: 4 + Math.random()*5
  });
}

let heartAnim = 0;
let pigWalkPhase = 0;

// ── Pixel art draw helpers ──
function px(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), w, h);
}

// Draw piggy (pixel art, scale S)
function drawPiggy(x, y, bounceOff, walking) {
  const S = SCALE * 2;
  const bx = x - camX;
  // bounce
  const bounce = walking ? Math.sin(pigWalkPhase * 2) * S * 1.5 : 0;
  const by = y - bounce;

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(bx, y + S*5, S*5, S*1.5, 0, 0, Math.PI*2);
  ctx.fill();

  // body (round pink blob)
  ctx.fillStyle = '#ffb8d4';
  ctx.beginPath();
  ctx.ellipse(bx, by, S*5, S*4.5, 0, 0, Math.PI*2);
  ctx.fill();

  // belly
  ctx.fillStyle = '#ffd0e4';
  ctx.beginPath();
  ctx.ellipse(bx, by + S*1.5, S*3, S*2.5, 0, 0, Math.PI*2);
  ctx.fill();

  // head (slightly above body)
  ctx.fillStyle = '#ffb8d4';
  ctx.beginPath();
  ctx.ellipse(bx, by - S*3.5, S*4, S*3.8, 0, 0, Math.PI*2);
  ctx.fill();

  // snout
  ctx.fillStyle = '#ff9ec4';
  ctx.beginPath();
  ctx.ellipse(bx + S*0.5, by - S*2.5, S*2.2, S*1.5, 0.1, 0, Math.PI*2);
  ctx.fill();
  // nostrils
  ctx.fillStyle = '#c06080';
  ctx.beginPath();
  ctx.ellipse(bx - S*0.5, by - S*2.5, S*0.5, S*0.4, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(bx + S*1.5, by - S*2.5, S*0.5, S*0.4, 0, 0, Math.PI*2);
  ctx.fill();

  // eyes
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(bx - S*1.5, by - S*4, S*0.7, S*0.8, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(bx + S*1.8, by - S*4, S*0.7, S*0.8, 0, 0, Math.PI*2);
  ctx.fill();
  // eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(bx - S*1.2, by - S*4.3, S*0.25, S*0.25, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(bx + S*2.1, by - S*4.3, S*0.25, S*0.25, 0, 0, Math.PI*2);
  ctx.fill();

  // ears
  ctx.fillStyle = '#ffb8d4';
  ctx.beginPath();
  ctx.ellipse(bx - S*3.2, by - S*5.5, S*1.4, S*1.8, -0.4, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(bx + S*3.2, by - S*5.5, S*1.4, S*1.8, 0.4, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#ff9ec4';
  ctx.beginPath();
  ctx.ellipse(bx - S*3.2, by - S*5.5, S*0.7, S*1.0, -0.4, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(bx + S*3.2, by - S*5.5, S*0.7, S*1.0, 0.4, 0, Math.PI*2);
  ctx.fill();

  // bow (red)
  ctx.fillStyle = '#e03030';
  // left wing
  ctx.beginPath();
  ctx.ellipse(bx - S*1.5, by - S*6.8, S*1.2, S*0.7, -0.5, 0, Math.PI*2);
  ctx.fill();
  // right wing
  ctx.beginPath();
  ctx.ellipse(bx + S*1.5, by - S*6.8, S*1.2, S*0.7, 0.5, 0, Math.PI*2);
  ctx.fill();
  // center knot
  ctx.fillStyle = '#ff6060';
  ctx.beginPath();
  ctx.ellipse(bx, by - S*6.8, S*0.6, S*0.6, 0, 0, Math.PI*2);
  ctx.fill();

  // tail (curly)
  ctx.strokeStyle = '#ffb8d4';
  ctx.lineWidth = S*1.2;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(bx - S*5, by - S*1);
  ctx.bezierCurveTo(bx - S*8, by - S*3, bx - S*9, by + S*1, bx - S*7, by + S*2);
  ctx.stroke();

  // legs (walking animation)
  const legSwing = walking ? Math.sin(pigWalkPhase) * S * 2.5 : 0;
  ctx.fillStyle = '#ffb8d4';
  // front legs
  ctx.beginPath();
  ctx.ellipse(bx + S*2.5, by + S*4 + legSwing, S*1.2, S*2, 0.15, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(bx + S*0.5, by + S*4 - legSwing, S*1.2, S*2, -0.15, 0, Math.PI*2);
  ctx.fill();
  // back legs
  ctx.beginPath();
  ctx.ellipse(bx - S*2, by + S*3.5 - legSwing*0.8, S*1.2, S*1.8, -0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(bx - S*3.5, by + S*3.5 + legSwing*0.8, S*1.2, S*1.8, 0.1, 0, Math.PI*2);
  ctx.fill();

  // hooves
  ctx.fillStyle = '#e890b0';
  ctx.beginPath(); ctx.ellipse(bx + S*2.5, by + S*6 + legSwing, S*1.2, S*0.7, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bx + S*0.5, by + S*6 - legSwing, S*1.2, S*0.7, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bx - S*2, by + S*5.2 - legSwing*0.8, S*1.2, S*0.7, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(bx - S*3.5, by + S*5.2 + legSwing*0.8, S*1.2, S*0.7, 0, 0, Math.PI*2); ctx.fill();
}

// Draw emo guy pixel art
function drawEmoGuy(wx, wy) {
  const sx = wx - camX;
  const sy = wy;
  const S = SCALE * 2;

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(sx, sy + S*0.5, S*4, S*1.2, 0, 0, Math.PI*2);
  ctx.fill();

  // legs (black jeans)
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(sx - S*2.5, sy - S*8, S*2.2, S*8);
  ctx.fillRect(sx + S*0.3, sy - S*8, S*2.2, S*8);
  // shoes
  ctx.fillStyle = '#111';
  ctx.fillRect(sx - S*3, sy - S*1, S*3, S*1.5);
  ctx.fillRect(sx + S*0.3, sy - S*1, S*3, S*1.5);

  // hoodie body (black with slight purple tint)
  ctx.fillStyle = '#1c1c2e';
  ctx.beginPath();
  ctx.roundRect(sx - S*4, sy - S*20, S*8, S*12, S*1);
  ctx.fill();

  // hoodie pocket
  ctx.fillStyle = '#16162a';
  ctx.fillRect(sx - S*2, sy - S*11, S*4, S*2.5);

  // arms (leaning against tree - left arm up)
  ctx.fillStyle = '#1c1c2e';
  // left arm raised
  ctx.save();
  ctx.translate(sx - S*4, sy - S*18);
  ctx.rotate(-0.9);
  ctx.fillRect(-S*1, 0, S*2, S*7);
  ctx.restore();
  // right arm down
  ctx.fillRect(sx + S*3, sy - S*19, S*2, S*6);

  // hands
  ctx.fillStyle = '#c8a090';
  // left hand (raised, touching tree)
  ctx.save();
  ctx.translate(sx - S*4, sy - S*18);
  ctx.rotate(-0.9);
  ctx.beginPath();
  ctx.ellipse(0, S*7.5, S*1.2, S*1.2, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  // right hand
  ctx.beginPath();
  ctx.ellipse(sx + S*4, sy - S*13.5, S*1.2, S*1.2, 0, 0, Math.PI*2);
  ctx.fill();

  // head
  ctx.fillStyle = '#c8a090';
  ctx.beginPath();
  ctx.ellipse(sx, sy - S*24, S*3.8, S*4, 0, 0, Math.PI*2);
  ctx.fill();

  // messy black hair (covering most of face)
  ctx.fillStyle = '#111';
  // main hair mass
  ctx.beginPath();
  ctx.ellipse(sx, sy - S*26, S*4.2, S*3, 0, 0, Math.PI*2);
  ctx.fill();
  // side swoosh left
  ctx.beginPath();
  ctx.moveTo(sx - S*3.5, sy - S*24);
  ctx.bezierCurveTo(sx - S*5, sy - S*22, sx - S*4, sy - S*20, sx - S*2, sy - S*21.5);
  ctx.bezierCurveTo(sx - S*1, sy - S*22, sx - S*1.5, sy - S*24, sx - S*3.5, sy - S*24);
  ctx.fill();
  // bangs (cover left eye)
  ctx.beginPath();
  ctx.moveTo(sx - S*4, sy - S*25);
  ctx.bezierCurveTo(sx - S*2, sy - S*23, sx + S*0.5, sy - S*22.5, sx + S*1.5, sy - S*23.5);
  ctx.bezierCurveTo(sx + S*0.5, sy - S*24, sx - S*1, sy - S*25, sx - S*4, sy - S*25);
  ctx.fill();

  // visible eye (right - peeking through hair)
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(sx + S*1.8, sy - S*23.5, S*1, S*0.9, 0, 0, Math.PI*2);
  ctx.fill();
  // eye white
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(sx + S*2.1, sy - S*23.8, S*0.3, S*0.25, 0, 0, Math.PI*2);
  ctx.fill();
  // under-eye (emo dark circles)
  ctx.fillStyle = 'rgba(80,50,120,0.4)';
  ctx.beginPath();
  ctx.ellipse(sx + S*1.8, sy - S*22.8, S*1.2, S*0.5, 0, 0, Math.PI*2);
  ctx.fill();

  // slight mouth (neutral/subtle)
  ctx.strokeStyle = '#a07060';
  ctx.lineWidth = S*0.5;
  ctx.beginPath();
  ctx.moveTo(sx + S*0.5, sy - S*21.5);
  ctx.lineTo(sx + S*2.5, sy - S*21.5);
  ctx.stroke();

  // hoodie drawstrings
  ctx.strokeStyle = '#2a2a40';
  ctx.lineWidth = S*0.4;
  ctx.beginPath();
  ctx.moveTo(sx - S*0.5, sy - S*19.5);
  ctx.lineTo(sx - S*1.5, sy - S*14);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(sx + S*0.5, sy - S*19.5);
  ctx.lineTo(sx + S*1.5, sy - S*14);
  ctx.stroke();
}

// ── Sky gradient ──
function drawSky() {
  const progress = Math.min(1, camX / (WORLD_WIDTH - W));
  // per-column gradient
  const grad = ctx.createLinearGradient(0, 0, W, 0);
  grad.addColorStop(0,   lerpColor('#87CEEB','#5a3080', progress * 0.6));
  grad.addColorStop(0.5, lerpColor('#a0d8ef','#6e2090', progress * 0.8));
  grad.addColorStop(1,   lerpColor('#c8eeff','#3d1a6e', Math.min(1, progress * 1.4)));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // stars (appear toward right)
  if (progress > 0.4) {
    const starAlpha = (progress - 0.4) / 0.6;
    ctx.fillStyle = `rgba(255,255,255,${starAlpha * 0.9})`;
    const stars = [[W*0.6,H*0.08],[W*0.75,H*0.15],[W*0.85,H*0.06],[W*0.92,H*0.2],
                   [W*0.55,H*0.22],[W*0.7,H*0.03],[W*0.8,H*0.28],[W*0.95,H*0.12]];
    stars.forEach(([sx,sy]) => {
      ctx.beginPath();
      ctx.arc(sx, sy, 1.5, 0, Math.PI*2);
      ctx.fill();
    });
  }

  // sun/moon transition
  const sunX = W * 0.75 - progress * W * 0.5;
  const sunY = H * 0.15;
  if (progress < 0.7) {
    // sun
    const sunGrad = ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,40);
    sunGrad.addColorStop(0,'rgba(255,240,100,0.95)');
    sunGrad.addColorStop(0.6,'rgba(255,200,50,0.4)');
    sunGrad.addColorStop(1,'rgba(255,200,50,0)');
    ctx.fillStyle = sunGrad;
    ctx.beginPath();
    ctx.arc(sunX, sunY, 40, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fffbe0';
    ctx.beginPath();
    ctx.arc(sunX, sunY, 20, 0, Math.PI*2);
    ctx.fill();
  } else {
    // moon
    const moonAlpha = (progress - 0.7) / 0.3;
    ctx.fillStyle = `rgba(220,220,255,${moonAlpha * 0.9})`;
    ctx.beginPath();
    ctx.arc(sunX, sunY, 18, 0, Math.PI*2);
    ctx.fill();
  }
}

function lerpColor(a, b, t) {
  const parse = c => [parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];
  const [ar,ag,ab] = parse(a);
  const [br,bg,bb] = parse(b);
  t = Math.max(0, Math.min(1, t));
  const r = Math.round(ar + (br-ar)*t);
  const g = Math.round(ag + (bg-ag)*t);
  const bl2 = Math.round(ab + (bb-ab)*t);
  return `rgb(${r},${g},${bl2})`;
}

// ── Draw ground ──
function drawGround() {
  const progress = Math.min(1, camX / (WORLD_WIDTH - W));
  const gColor = lerpColor('#5a8a3c', '#2a1a4e', progress);
  const gColor2 = lerpColor('#4a7a30', '#1e1240', progress);

  // hills
  hills.forEach(h => {
    const hx = h.x - camX;
    ctx.fillStyle = lerpColor(h.color, '#1a0a3a', progress * 0.8);
    ctx.beginPath();
    ctx.moveTo(hx, GROUND_Y);
    ctx.bezierCurveTo(hx + h.w*0.2, GROUND_Y - h.h, hx + h.w*0.8, GROUND_Y - h.h, hx + h.w, GROUND_Y);
    ctx.fill();
  });

  // main ground
  const groundGrad = ctx.createLinearGradient(0, GROUND_Y, 0, H);
  groundGrad.addColorStop(0, gColor);
  groundGrad.addColorStop(1, gColor2);
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  // ground texture dots
  ctx.fillStyle = lerpColor('#4a7a28','#1a0a38',progress);
  for (let i = 0; i < W; i += 28) {
    ctx.fillRect(i - (camX % 28), GROUND_Y + 2, 14, 3);
  }

  // flowers
  flowers.forEach(f => {
    const fx = f.x - camX;
    if (fx < -10 || fx > W + 10) return;
    const fy = GROUND_Y - f.y;
    // stem
    ctx.strokeStyle = '#3a7a20';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.lineTo(fx, fy + 12);
    ctx.stroke();
    // petals
    ctx.fillStyle = f.color;
    for (let a = 0; a < 5; a++) {
      const angle = (a / 5) * Math.PI * 2;
      ctx.beginPath();
      ctx.ellipse(fx + Math.cos(angle)*f.size*0.7, fy + Math.sin(angle)*f.size*0.7,
                  f.size*0.6, f.size*0.4, angle, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.fillStyle = '#fff8c0';
    ctx.beginPath();
    ctx.arc(fx, fy, f.size*0.4, 0, Math.PI*2);
    ctx.fill();
  });
}

// ── Draw trees ──
function drawTrees() {
  trees.forEach(t => {
    const tx = t.x - camX;
    if (tx < -200 || tx > W + 200) return;
    const ty = GROUND_Y;

    // trunk
    const trunkGrad = ctx.createLinearGradient(tx - t.trunk/2, 0, tx + t.trunk/2, 0);
    trunkGrad.addColorStop(0, '#5a3820');
    trunkGrad.addColorStop(0.5, '#7a5030');
    trunkGrad.addColorStop(1, '#4a2810');
    ctx.fillStyle = trunkGrad;
    ctx.fillRect(tx - t.trunk/2, ty - t.h, t.trunk, t.h);

    if (!t.emo) {
      // leafy tree
      ctx.fillStyle = t.leafColor;
      ctx.beginPath();
      ctx.arc(tx, ty - t.h - 30, 45, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(tx - 28, ty - t.h - 5, 35, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(tx + 28, ty - t.h - 5, 35, 0, Math.PI*2);
      ctx.fill();
      // lighter top
      ctx.fillStyle = lerpColor(t.leafColor, '#88ff88', 0.25);
      ctx.beginPath();
      ctx.arc(tx + 8, ty - t.h - 38, 22, 0, Math.PI*2);
      ctx.fill();

      if (t.deco) {
        // sparkles on some trees
        ctx.fillStyle = 'rgba(255,255,200,0.7)';
        [[tx-20,ty-t.h-50],[tx+25,ty-t.h-20],[tx-10,ty-t.h-10]].forEach(([sx,sy]) => {
          ctx.beginPath(); ctx.arc(sx,sy,3,0,Math.PI*2); ctx.fill();
        });
      }
    } else {
      // emo/dark tree - twisted, dead-ish
      ctx.fillStyle = '#1e1250';
      ctx.beginPath();
      ctx.arc(tx, ty - t.h - 20, 50, 0, Math.PI*2);
      ctx.fill();
      // dark branches
      ctx.strokeStyle = '#3a2870';
      ctx.lineWidth = 6;
      [[-0.6,-1.2],[-1.0,-0.8],[0.6,-1.3],[1.1,-0.9]].forEach(([bx,by]) => {
        ctx.beginPath();
        ctx.moveTo(tx, ty - t.h);
        ctx.lineTo(tx + bx*60, ty - t.h + by*60);
        ctx.stroke();
      });
      // little stars/sparkles
      ctx.fillStyle = 'rgba(160,120,255,0.7)';
      [[tx-30,ty-t.h-60],[tx+35,ty-t.h-40],[tx,ty-t.h-75]].forEach(([sx,sy]) => {
        ctx.beginPath(); ctx.arc(sx,sy,2.5,0,Math.PI*2); ctx.fill();
      });
    }
  });
}

// ── Draw clouds ──
function drawClouds() {
  clouds.forEach(c => {
    const cx = (c.x - camX * 0.4 + WORLD_WIDTH) % (WORLD_WIDTH * 0.5);
    const cy = c.y / 100 * H * 0.3;
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath();
    ctx.ellipse(cx, cy, c.w * 0.5, c.w * 0.25, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx - c.w*0.2, cy + c.w*0.05, c.w*0.35, c.w*0.2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + c.w*0.2, cy + c.w*0.05, c.w*0.35, c.w*0.2, 0, 0, Math.PI*2);
    ctx.fill();
  });
}

// ── Draw puddle ──
function drawPuddle() {
  const px2 = PUDDLE_X - camX;
  const py = GROUND_Y + 4;
  if (px2 < -200 || px2 > W + 200) return;

  // puddle
  const puddleGrad = ctx.createRadialGradient(px2,py,0,px2,py,55);
  puddleGrad.addColorStop(0,'rgba(120,180,255,0.9)');
  puddleGrad.addColorStop(0.6,'rgba(80,140,220,0.7)');
  puddleGrad.addColorStop(1,'rgba(60,100,200,0.3)');
  ctx.fillStyle = puddleGrad;
  ctx.beginPath();
  ctx.ellipse(px2, py, 55, 16, 0, 0, Math.PI*2);
  ctx.fill();

  // shimmer
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath();
  ctx.ellipse(px2 - 15, py - 3, 18, 5, -0.3, 0, Math.PI*2);
  ctx.fill();

  // floating heart above puddle
  const heartY = GROUND_Y - 60 + Math.sin(heartAnim) * 10;
  const heartScale = 1 + Math.sin(heartAnim * 1.3) * 0.1;
  ctx.save();
  ctx.translate(px2, heartY);
  ctx.scale(heartScale, heartScale);
  drawHeart(0, 0, 18, `hsl(${340 + Math.sin(heartAnim)*20},80%,65%)`);
  ctx.restore();
}

function drawHeart(x, y, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y + size*0.4);
  ctx.bezierCurveTo(x, y, x - size, y, x - size, y + size*0.4);
  ctx.bezierCurveTo(x - size, y + size*0.8, x, y + size*1.2, x, y + size*1.5);
  ctx.bezierCurveTo(x, y + size*1.2, x + size, y + size*0.8, x + size, y + size*0.4);
  ctx.bezierCurveTo(x + size, y, x, y, x, y + size*0.4);
  ctx.fill();
}

// ── HUD ──
function drawHUD() {
  if (pig.arrived) return;
  // progress bar
  const pct = Math.min(1, pig.x / (EMO_X - 200));
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.roundRect(W/2 - 80, 14, 160, 12, 6);
  ctx.fill();
  ctx.fillStyle = '#ff9ec4';
  ctx.beginPath();
  ctx.roundRect(W/2 - 80, 14, 160 * pct, 12, 6);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '7px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('💕 FIND HIM', W/2, 11);
}

// ── Main loop ──
let last = 0;
function loop(ts) {
  const dt = Math.min(32, ts - last) / 16;
  last = ts;

  heartAnim += 0.04 * dt;

  // movement
  const moving = (moveRight || mobileRightHeld || keys['ArrowRight']) && !paused && !pig.arrived;

  if (moving) {
    pig.x += WALK_SPEED * dt;
    pigWalkPhase += 0.18 * dt;
  }

  // cap at emo guy
  if (pig.x > EMO_X - 100) {
    pig.x = EMO_X - 100;
    if (!pig.arrived) triggerEnd();
  }

  // jump
  if (jumpQueued && pig.onGround && !paused) {
    pig.vy = JUMP_VEL;
    pig.onGround = false;
    jumpQueued = false;
  }

  // gravity
  pig.y += pig.vy * dt;
  pig.vy += GRAVITY * dt;
  if (pig.y >= 0) {
    pig.y = 0;
    pig.vy = 0;
    pig.onGround = true;
  }

  // camera
  const targetCam = pig.x - W * 0.3;
  camX += (targetCam - camX) * 0.08 * dt * 2;
  camX = Math.max(0, Math.min(WORLD_WIDTH - W, camX));

  // scene triggers
  if (sceneIdx < scenes.length) {
    const scene = scenes[sceneIdx];
    if (pig.x > scene.triggerX + W * 0.1) {
      showDialogue(scene.speaker, scene.lines);
      sceneIdx++;
    }
  }

  // ── Draw ──
  drawSky();
  drawClouds();
  drawGround();
  drawTrees();
  drawPuddle();

  // emo guy
  const emoScreen = EMO_X - camX;
  if (emoScreen > -50 && emoScreen < W + 50) {
    drawEmoGuy(EMO_X, GROUND_Y - 2);
  }

  // piggy
  drawPiggy(pig.x, GROUND_Y - 40 + pig.y, !pig.onGround, moving);

  drawHUD();

  requestAnimationFrame(loop);
}

// ── Start ──
setTimeout(() => {
  document.getElementById('loading').style.display = 'none';
  requestAnimationFrame(loop);
}, 600);
</script>
