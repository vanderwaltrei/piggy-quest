<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Piggy's Journey</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .answerBtn:active { transform: scale(0.95); }
  #yesBtn { background: #f9e040; color: #2a1200; box-shadow: 4px 4px 0 #2a1200; }
  #heckYesBtn { background: #e05050; color: #fff; box-shadow: 4px 4px 0 #2a1200; }
  #noBtn {
    background: #888;
    color: #fff;
    box-shadow: 4px 4px 0 #2a1200;
    position: fixed;
    z-index: 400;
    display: none;
    transition: all 0.15s ease;
  }
  #btnRow { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; }
  #endTitle {
    font-family: monospace;
    font-size: clamp(18px, 5vw, 36px);
    font-weight: bold;
    color: #f9e040;
    text-shadow: 3px 3px 0 #2a1200;
    letter-spacing: 2px;
  }
  #endScreen {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(20,5,40,0.95);
    z-index: 500;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: monospace;
    color: #fff;
  }
  #endScreen.active { display: flex; }
  #endText {
    font-family: monospace;
    font-size: clamp(14px, 3vw, 18px);
    color: #fff;
    max-width: 450px;
    text-align: center;
    margin-bottom: 24px;
    line-height: 1.5;
  }
  #heartScreen {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(20,5,40,0.95);
    z-index: 500;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: monospace;
    color: #fff;
  }
  #heartScreen.active { display: flex; }
  #heartScreen h1 { font-size: clamp(28px,8vw,64px); color: #ff6b9d; text-shadow: 4px 4px 0 #2a1200; margin-bottom: 20px; }
  #heartScreen p { font-size: clamp(14px,3vw,24px); color: #f9e040; margin-bottom: 30px; }
  #restartBtn {
    font-family: monospace;
    font-size: clamp(14px,3vw,20px);
    font-weight: bold;
    padding: 10px 28px;
    border: 4px solid #2a1200;
    border-radius: 4px;
    cursor: pointer;
    background: #f9e040;
    color: #2a1200;
    box-shadow: 4px 4px 0 #2a1200;
    margin-top: 10px;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
</div>

<div id="mobileControls">
  <div id="moveLeftZone"></div>
  <div id="jumpZone"></div>
  <div id="moveRightZone"></div>
</div>

<div id="dialogueBox"></div>

<div id="endScreen">
  <div id="endTitle">REI AWAITS</div>
  <div id="endText"></div>
  <div id="btnRow">
    <button class="answerBtn" id="yesBtn">YES!</button>
    <button class="answerBtn" id="heckYesBtn">HECK YES!</button>
  </div>
</div>

<button class="answerBtn" id="noBtn">No...</button>

<div id="heartScreen">
  <h1>YAY!</h1>
  <p>The piggy and the guy lived happily ever after</p>
  <p style="font-size:clamp(30px,8vw,60px)">🐷</p>
  <button id="restartBtn">Play Again ↺</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ---- SCALE ----
const BASE_W = 480, BASE_H = 270;
let scale = 1;

function resize() {
  const sw = window.innerWidth / BASE_W;
  const sh = window.innerHeight / BASE_H;
  scale = Math.min(sw, sh);
  canvas.width = BASE_W;
  canvas.height = BASE_H;
  canvas.style.width = (BASE_W * scale) + 'px';
  canvas.style.height = (BASE_H * scale) + 'px';
  ctx.imageSmoothingEnabled = false;
}
resize();
window.addEventListener('resize', resize);

// ---- MOBILE DETECTION ----
const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
if (isMobile) document.getElementById('mobileControls').style.display = 'block';

// ---- PIXEL DRAWING HELPERS ----
function px(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.round(x), Math.round(y), w, h);
}

// ---- COLORS ----
const C = {
  barnWall: '#7a4020',
  barnWallDark: '#5c2e10',
  barnWallLight: '#8b4c28',
  barnPost: '#c8882a',
  barnFloor: '#c8882a',
  barnFloorDark: '#a06010',
  floorZig: '#e0a030',
  dirtBg: '#6b3a10',
  dirt: '#8b4c10',
  crate: '#c8882a',
  crateDark: '#7a5010',
  crateX: '#8b6020',
  barrel: '#4a3020',
  barrelBand: '#6a4828',
  barrelLight: '#6a4828',
  sky: '#7ec8e3',
  grassTop: '#4caf50',
  grassMid: '#388e3c',
  grassDark: '#2e7d32',
  forestBg: '#87c87e',
  forestBgDark: '#5da855',
  twilightSky: '#3d1a6e',
  twilightMid: '#5a2590',
  twilightHorizon: '#8b4fc8',
  pigBody: '#f5b8c0',
  pigDark: '#d88a96',
  pigSnout: '#f0a0a8',
  pigEye: '#1a0a00',
  pigBow: '#e03030',
  uiBg: '#f5c8a0',
  uiBorder: '#8b3a3a',
  barPink: '#e87898',
  barDarkPink: '#c04860',
  barOrange: '#e06820',
  barDarkOrange: '#a04010',
  lamp: '#888',
  lampShade: '#666',
  window: '#7ec8e3',
  ladder: '#c8882a',
  pitchfork: '#888',
  sack: '#b8a070',
  puddle: '#4a7abf',
  heart: '#e03060',
  tree: '#2d5e1e',
  treeTrunk: '#5c3a1a',
  emuHoodie: '#1a1a2e',
  emuHair: '#111',
  emuSkin: '#d4a5a0',
};

// ---- GAME STATE ----
let cameraX = 0;
const WORLD_W = 2400;
const GROUND_Y = BASE_H - 72;

const player = {
  x: 60, y: GROUND_Y - 42,
  w: 22, h: 22,
  vy: 0, vx: 0,
  onGround: false,
  walkFrame: 0,
  walkTimer: 0,
  facingRight: true,
  squash: 1, stretch: 1,
  alive: true
};

const GRAVITY = 0.38;
const JUMP_FORCE = -7.2;
const MOVE_SPEED = 1.8;

let keys = { right: false, left: false, jump: false };
let jumpPressed = false;
let canJump = true;

let progress = 0;
let scene = 0;
let movementLocked = false;

// Dialogue state
let dlgText = '';
let dlgShown = '';
let dlgTimer = 0;
let dlgActive = false;
let dlgDone = false;

// Triggers
const triggers = [
  { x: 80, fired: false, text: "It's cold... I hope he's still waiting.", scene: 0 },
  { x: 900, fired: false, text: "I'm almost there... just over the hill.", scene: 1 },
  { x: 1800, fired: false, text: "Just a little further... he's right there!", scene: 2 },
];

// Platforms / obstacles
const platforms = [
  { x: 870, y: GROUND_Y - 32, w: 32, h: 32, type: 'crate2' },
  { x: 902, y: GROUND_Y - 48, w: 16, h: 48, type: 'barrel3' },
  { x: 1390, y: GROUND_Y - 32, w: 32, h: 32, type: 'crate2' },
  { x: 1422, y: GROUND_Y - 48, w: 16, h: 48, type: 'barrel3' },
];

// Puddle position
const puddle = { x: 1200, y: GROUND_Y - 14, w: 40, h: 8 };
let heartAnim = 0;

// NPC (emo guy) position
const npc = { x: WORLD_W - 100, y: GROUND_Y - 42 };
const tree = { x: WORLD_W - 130, y: GROUND_Y - 100 };

// End screen
let endShown = false;

// ---- DRAWING FUNCTIONS ----

function drawBarnBg(camX, alpha) {
  ctx.globalAlpha = alpha;
  px(0, 0, BASE_W, GROUND_Y, C.barnWall);
  for (let xi = 0; xi < BASE_W + 16; xi += 8) {
    px(xi, 0, 1, GROUND_Y, C.barnWallDark);
  }
  const postX = (240 - camX % 240 + 240) % 240 - 20;
  for (let p = -1; p <= 2; p++) {
    const px2 = (240 * p) - (camX % 240) + 80;
    if (px2 > -30 && px2 < BASE_W + 30) {
      drawBarnPost(px2);
    }
  }
  ctx.globalAlpha = 1;
}

function drawBarnPost(x) {
  px(x, 20, 12, GROUND_Y - 20, C.barnPost);
  px(x - 6, 20, 24, 6, C.barnPost);
  px(x - 12, 14, 10, 12, C.barnPost);
  px(x + 6, 14, 10, 12, C.barnPost);
}

function drawForestBg(camX, alpha) {
  ctx.globalAlpha = alpha;
  px(0, 0, BASE_W, GROUND_Y, C.forestBg);
  for (let yi = 0; yi < GROUND_Y; yi += 4) {
    const t = yi / GROUND_Y;
    const r = Math.round(135 + t * 20);
    const g = Math.round(200 + t * 10);
    const b = Math.round(126 + t * 10);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0, yi, BASE_W, 4);
  }
  for (let tx = -((camX * 0.3) % 120); tx < BASE_W + 60; tx += 120) {
    drawFarTree(tx, GROUND_Y - 40, 20, 50, C.forestBgDark);
  }
  ctx.globalAlpha = 1;
}

function drawFarTree(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x + w/2 - 3, y, 6, h);
  ctx.fillRect(x, y - h * 0.6, w, h * 0.65);
  ctx.fillRect(x + 4, y - h * 0.85, w - 8, h * 0.4);
}

function drawTwilightBg(camX, alpha) {
  ctx.globalAlpha = alpha;
  for (let yi = 0; yi < GROUND_Y; yi += 2) {
    const t = yi / GROUND_Y;
    const r = Math.round(61 + t * 60);
    const g = Math.round(26 + t * 30);
    const b = Math.round(110 + t * 50);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0, yi, BASE_W, 2);
  }
  ctx.fillStyle = '#fff';
  const stars = [[30,20],[80,10],[150,35],[220,8],[310,22],[380,15],[440,30],[100,50],[260,45],[410,12]];
  for (const [sx, sy] of stars) {
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.globalAlpha = 1;
}

function drawGround(camX, t01, t12) {
  const barnColor = C.floorZig;
  const grassColor = C.grassTop;
  const floorTop = GROUND_Y;

  const r1 = parseInt(barnColor.slice(1,3),16);
  const g1 = parseInt(barnColor.slice(3,5),16);
  const b1 = parseInt(barnColor.slice(5,7),16);
  const r2 = parseInt(grassColor.slice(1,3),16);
  const g2 = parseInt(grassColor.slice(3,5),16);
  const b2 = parseInt(grassColor.slice(5,7),16);
  const mix = Math.max(0, Math.min(1, t01));
  const fr = Math.round(r1 + (r2 - r1) * mix);
  const fg = Math.round(g1 + (g2 - g1) * mix);
  const fb = Math.round(b1 + (b2 - b1) * mix);
  const floorColor = `rgb(${fr},${fg},${fb})`;

  ctx.fillStyle = floorColor;
  for (let xi = 0; xi < BASE_W; xi += 8) {
    ctx.fillRect(xi, floorTop, 8, 4);
    ctx.fillRect(xi + 4, floorTop - 2, 4, 2);
  }
  ctx.fillRect(0, floorTop + 4, BASE_W, BASE_H - floorTop - 4);

  ctx.fillStyle = mix > 0.5 ? C.grassDark : C.barnFloorDark;
  ctx.fillRect(0, floorTop + 6, BASE_W, 6);
  ctx.fillStyle = C.dirt;
  ctx.fillRect(0, floorTop + 12, BASE_W, BASE_H - floorTop - 12);
}

function drawCrate(x, y, w, h) {
  px(x, y, w, h, C.crate);
  px(x, y, w, 2, C.crateDark);
  px(x, y + h - 2, w, 2, C.crateDark);
  px(x, y, 2, h, C.crateDark);
  px(x + w - 2, y, 2, h, C.crateDark);
  ctx.strokeStyle = C.crateX;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x + 2, y + 2); ctx.lineTo(x + w - 2, y + h - 2);
  ctx.moveTo(x + w - 2, y + 2); ctx.lineTo(x + 2, y + h - 2);
  ctx.stroke();
}

function drawBarrel(x, y, w, h) {
  px(x + 2, y, w - 4, h, C.barrel);
  px(x, y + 4, w, h - 8, C.barrel);
  px(x, y + 4, w, 3, C.barrelBand);
  px(x, y + h - 7, w, 3, C.barrelBand);
  px(x, y + Math.floor(h/2) - 1, w, 3, C.barrelBand);
  px(x + 2, y + 2, 2, h - 4, C.barrelLight);
}

function drawLamp(x, y) {
  px(x + 5, y, 2, 12, C.lamp);
  px(x, y + 12, 12, 8, C.lampShade);
  px(x - 2, y + 16, 16, 4, C.lampShade);
  ctx.fillStyle = 'rgba(255,220,120,0.18)';
  ctx.beginPath();
  ctx.arc(x + 6, y + 22, 20, 0, Math.PI * 2);
  ctx.fill();
}

function drawWindow(x, y, w, h) {
  px(x, y, w, h, C.window);
  px(x, y, w, 3, C.barnPost);
  px(x, y + h - 3, w, 3, C.barnPost);
  px(x, y, 3, h, C.barnPost);
  px(x + w - 3, y, 3, h, C.barnPost);
  px(x + Math.floor(w/2) - 1, y, 2, h, C.barnPost);
  px(x, y + Math.floor(h/2) - 1, w, 2, C.barnPost);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillRect(x + 4, y + 6, 10, 5);
  ctx.fillRect(x + 8, y + 4, 8, 4);
}

function drawLadder(x, y, h) {
  px(x, y, 3, h, C.ladder);
  px(x + 10, y, 3, h, C.ladder);
  for (let yi = y + 4; yi < y + h; yi += 8) {
    px(x, yi, 13, 2, C.barnPost);
  }
}

function drawPitchfork(x, y) {
  px(x + 3, y, 2, 40, C.pitchfork);
  px(x, y, 2, 14, C.pitchfork);
  px(x + 6, y, 2, 14, C.pitchfork);
  px(x - 2, y, 2, 14, C.pitchfork);
}

function drawSack(x, y, w, h) {
  ctx.fillStyle = C.sack;
  ctx.beginPath();
  ctx.ellipse(x + w/2, y + h/2, w/2, h/2, 0, 0, Math.PI * 2);
  ctx.fill();
  px(x + w/2 - 2, y, 4, 5, '#8b7040');
}

function drawBigTree(x, y) {
  px(x + 12, y + 30, 16, 60, C.treeTrunk);
  px(x + 10, y + 55, 20, 35, C.treeTrunk);
  ctx.fillStyle = C.tree;
  ctx.fillRect(x, y, 40, 50);
  ctx.fillRect(x - 8, y + 15, 56, 35);
  ctx.fillRect(x + 5, y - 18, 30, 28);
  ctx.fillStyle = '#1d4a12';
  ctx.fillRect(x + 5, y + 5, 10, 8);
  ctx.fillRect(x + 22, y + 20, 12, 10);
}

function drawEmoGuy(x, y) {
  px(x, y + 10, 22, 22, C.emuHoodie);
  px(x - 2, y + 4, 26, 14, C.emuHoodie);
  px(x + 4, y + 6, 14, 12, C.emuSkin);
  px(x + 2, y, 18, 10, C.emuHair);
  px(x, y + 2, 8, 8, C.emuHair);
  px(x + 4, y - 3, 14, 6, C.emuHair);
  px(x + 10, y + 2, 10, 6, C.emuHair);
  px(x + 6, y + 10, 2, 1, C.emuHair);
  px(x + 12, y + 10, 2, 1, C.emuHair);
  px(x + 8, y + 15, 6, 1, C.emuHair);
  px(x + 7, y + 16, 2, 1, C.emuHair);
  px(x + 13, y + 16, 2, 1, C.emuHair);
  px(x + 18, y + 12, 10, 6, C.emuHoodie);
  px(x - 8, y + 12, 10, 6, C.emuHoodie);
  px(x + 2, y + 28, 8, 14, '#111');
  px(x + 12, y + 28, 8, 14, '#111');
  px(x, y + 40, 12, 5, '#1a1a1a');
  px(x + 10, y + 40, 12, 5, '#1a1a1a');
}

function drawPig(x, y, walkFrame, squash, stretch, onGround) {
  const bw = Math.round(22 * squash);
  const bh = Math.round(22 * stretch);
  const bx = x - (bw - 22) / 2;
  const by = y - (bh - 22);

  px(bx + 1, by + 3, bw - 2, bh - 6, C.pigBody);
  px(bx, by + 5, bw, bh - 10, C.pigBody);
  px(bx + 2, by + 1, bw - 4, bh - 2, C.pigBody);
  px(bx + 2, by + bh - 8, bw - 4, 5, C.pigDark);

  const snoutX = bx + bw - 7;
  const snoutY = by + Math.floor(bh / 2);
  px(snoutX, snoutY, 8, 6, C.pigSnout);
  px(snoutX + 1, snoutY + 1, 2, 2, C.pigEye);
  px(snoutX + 5, snoutY + 1, 2, 2, C.pigEye);

  px(bx + bw - 10, by + Math.floor(bh / 2) - 3, 3, 3, C.pigEye);
  px(bx + bw - 12, by + 1, 6, 5, C.pigDark);
  px(bx + bw - 11, by + 2, 4, 3, '#f0a8b0');

  const legAnim = onGround ? Math.sin(walkFrame * 0.4) * 3 : 0;
  px(bx + 4, by + bh - 5, 5, 5 + Math.round(legAnim), '#d88a96');
  px(bx + 12, by + bh - 5, 5, 5 - Math.round(legAnim), '#d88a96');

  const bowX = bx + 2;
  const bowY = by + 1;
  px(bowX, bowY + 1, 4, 3, C.pigBow);
  px(bowX + 5, bowY + 1, 4, 3, C.pigBow);
  px(bowX + 3, bowY + 2, 3, 2, '#ff6060');

  px(bx, by + Math.floor(bh * 0.55), 4, 3, C.pigDark);
  px(bx - 2, by + Math.floor(bh * 0.5), 3, 3, C.pigDark);
}

function drawPuddle(x, y) {
  ctx.fillStyle = C.puddle;
  ctx.beginPath();
  ctx.ellipse(x + 20, y + 4, 20, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillRect(x + 8, y + 2, 8, 2);
}

function drawHeart(x, y, frame) {
  const hy = y - Math.sin(frame * 0.08) * 6;
  const alpha = 0.7 + Math.sin(frame * 0.12) * 0.3;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = C.heart;
  ctx.fillRect(x + 2, hy, 2, 2);
  ctx.fillRect(x + 6, hy, 2, 2);
  ctx.fillRect(x, hy + 2, 10, 4);
  ctx.fillRect(x + 2, hy + 6, 6, 2);
  ctx.fillRect(x + 4, hy + 8, 2, 2);
  ctx.globalAlpha = 1;
}

function drawPigHeadUI(x, y) {
  px(x + 2, y + 2, 16, 16, C.pigBody);
  px(x + 1, y + 4, 18, 12, C.pigBody);
  px(x + 3, y + 1, 14, 18, C.pigBody);
  px(x + 12, y + 9, 7, 5, C.pigSnout);
  px(x + 13, y + 10, 2, 2, C.pigEye);
  px(x + 16, y + 10, 2, 2, C.pigEye);
  px(x + 7, y + 7, 3, 3, C.pigEye);
  px(x + 9, y + 2, 5, 4, C.pigDark);
  px(x + 2, y + 2, 4, 3, C.pigBow);
  px(x + 7, y + 2, 4, 3, C.pigBow);
  px(x + 5, y + 3, 3, 2, '#ff6060');
}

function drawBaconBar(x, y, w, fill, color1, color2) {
  px(x - 2, y - 2, w + 4, 14, '#2a1200');
  px(x, y, w, 10, color2);
  px(x, y, Math.round(w * fill), 10, color1);
  for (let xi = x; xi < x + Math.round(w * fill) - 4; xi += 8) {
    px(xi + 4, y + 2, 2, 6, 'rgba(255,255,255,0.2)');
  }
}

// ---- BARN SCENE DECORATIONS ----
const barnDecor = [
  { type: 'crate', x: 20, y: GROUND_Y - 32, w: 32, h: 32 },
  { type: 'crate', x: 20, y: GROUND_Y - 64, w: 32, h: 32 },
  { type: 'barrel', x: 140, y: GROUND_Y - 28, w: 24, h: 28 },
  { type: 'barrel', x: 170, y: GROUND_Y - 28, w: 24, h: 28 },
  { type: 'lamp', x: 340, y: 20 },
  { type: 'window', x: 380, y: 30, w: 60, h: 40 },
  { type: 'ladder', x: 200, y: GROUND_Y - 80, h: 80 },
  { type: 'pitchfork', x: 460, y: GROUND_Y - 40 },
  { type: 'sack', x: 300, y: GROUND_Y - 22, w: 22, h: 22 },
  { type: 'sack', x: 320, y: GROUND_Y - 30, w: 18, h: 18 },
  { type: 'crate', x: 520, y: GROUND_Y - 32, w: 32, h: 32 },
  { type: 'crate', x: 552, y: GROUND_Y - 32, w: 32, h: 32 },
  { type: 'barrel', x: 610, y: GROUND_Y - 28, w: 24, h: 28 },
  { type: 'lamp', x: 640, y: 20 },
  { type: 'window', x: 680, y: 30, w: 60, h: 40 },
  { type: 'lamp', x: 1100, y: 20 },
  { type: 'sack', x: 1050, y: GROUND_Y - 22, w: 22, h: 22 },
];

// ---- COLLISION ----
function getObstacles() {
  const obs = [];
  for (const d of barnDecor) {
    if (d.type === 'crate' || d.type === 'barrel') {
      let ow = d.w, oh = d.h;
      if (d.type === 'barrel') { ow = d.w; oh = d.h; }
      obs.push({ x: d.x, y: d.y, w: ow, h: oh });
    }
  }
  for (const p of platforms) {
    obs.push({ x: p.x, y: p.y, w: p.w, h: p.h });
  }
  return obs;
}
const obstacles = getObstacles();

function rectOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

// ---- DIALOGUE ----
const dlgBox = document.getElementById('dialogueBox');

function showDialogue(text) {
  dlgText = text;
  dlgShown = '';
  dlgTimer = 0;
  dlgActive = true;
  dlgDone = false;
  dlgBox.style.display = 'block';
  dlgBox.textContent = '';
}

function hideDialogue() {
  dlgActive = false;
  dlgBox.style.display = 'none';
}

function updateDialogue(dt) {
  if (!dlgActive) return;
  dlgTimer += dt;
  const charsPerSec = 30;
  const charIdx = Math.floor(dlgTimer * charsPerSec / 1000);
  if (charIdx >= dlgText.length) {
    dlgShown = dlgText;
    dlgDone = true;
  } else {
    dlgShown = dlgText.slice(0, charIdx);
  }
  dlgBox.textContent = dlgShown;
}

let dlgHideTimer = 0;

// ---- SCENE BACKGROUNDS ----
function getSceneBlends() {
  const barnEnd = 700, barnTransEnd = 1100;
  const forestEnd = 1600, forestTransEnd = 1900;
  const cx = cameraX;
  let barnAlpha = 1, forestAlpha = 0, twilightAlpha = 0;
  if (cx < barnEnd) { barnAlpha = 1; forestAlpha = 0; }
  else if (cx < barnTransEnd) {
    const t = (cx - barnEnd) / (barnTransEnd - barnEnd);
    barnAlpha = 1 - t; forestAlpha = t;
  } else if (cx < forestEnd) { barnAlpha = 0; forestAlpha = 1; }
  else if (cx < forestTransEnd) {
    const t = (cx - forestEnd) / (forestTransEnd - forestEnd);
    forestAlpha = 1 - t; twilightAlpha = t;
  } else { forestAlpha = 0; twilightAlpha = 1; }
  return { barnAlpha, forestAlpha, twilightAlpha };
}

// ---- END SCREEN FUNCTIONS ----
function showEndScreen() {
  const endScreen = document.getElementById('endScreen');
  const endText = document.getElementById('endText');
  endText.textContent = '"You made it. I was about to think you got lost in the cozy forest. Will you finally be my piggy for the rest of our journey?"';
  endScreen.classList.add('active');

  // Show and position the No button below the other buttons
  const noBtn = document.getElementById('noBtn');
  noBtn.style.display = 'block';
  positionNoBtnBelowButtons();
}

function positionNoBtnBelowButtons() {
  const noBtn = document.getElementById('noBtn');
  const btnRow = document.getElementById('btnRow');
  const rect = btnRow.getBoundingClientRect();
  
  noBtn.style.position = 'fixed';
  noBtn.style.left = (rect.left + rect.width / 2) + 'px';
  noBtn.style.top = (rect.bottom + 10) + 'px';
  noBtn.style.transform = 'translateX(-50%)';
  noBtn.style.bottom = 'auto';
  noBtn.style.right = 'auto';
  noBtn.style.zIndex = '600'; // Higher than endScreen (500) to be clickable
}

function randomizeNoBtn() {
  const noBtn = document.getElementById('noBtn');
  const maxX = window.innerWidth - 120;
  const maxY = window.innerHeight - 60;
  noBtn.style.position = 'fixed';
  noBtn.style.left = Math.floor(Math.random() * maxX) + 'px';
  noBtn.style.top = Math.floor(Math.random() * maxY) + 'px';
  noBtn.style.bottom = 'auto';
  noBtn.style.right = 'auto';
  noBtn.style.transform = 'none';
  noBtn.style.zIndex = '600'; // Keep it above endScreen
}

// Make No button run away
const noBtn = document.getElementById('noBtn');
noBtn.addEventListener('mouseover', randomizeNoBtn);
noBtn.addEventListener('touchstart', (e) => {
  e.preventDefault();
  randomizeNoBtn();
}, { passive: false });

function showHeartScreen() {
  document.getElementById('endScreen').classList.remove('active');
  document.getElementById('noBtn').style.display = 'none';
  document.getElementById('heartScreen').classList.add('active');
}

// ---- MAIN RENDER ----
let lastTime = 0;

function render(ts) {
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  updateDialogue(dt);

  // ---- PHYSICS ----
  if (!movementLocked) {
    if (keys.right) {
      player.vx = MOVE_SPEED;
      player.facingRight = true;
    } else if (keys.left) {
      player.vx = -MOVE_SPEED;
      player.facingRight = false;
    } else {
      player.vx *= 0.7;
    }

    if (keys.jump && player.onGround && canJump) {
      player.vy = JUMP_FORCE;
      player.onGround = false;
      canJump = false;
      player.stretch = 1.35;
      player.squash = 0.75;
    }
    if (!keys.jump) canJump = true;
    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;

    if (player.y >= GROUND_Y - player.h) {
      player.y = GROUND_Y - player.h;
      player.vy = 0;
      player.onGround = true;
    }

    for (const obs of obstacles) {
      if (rectOverlap(player.x, player.y, player.w, player.h, obs.x, obs.y, obs.w, obs.h)) {
        const overlapLeft = (player.x + player.w) - obs.x;
        const overlapRight = (obs.x + obs.w) - player.x;
        const overlapTop = (player.y + player.h) - obs.y;
        const overlapBottom = (obs.y + obs.h) - player.y;

        const minH = Math.min(overlapLeft, overlapRight);
        const minV = Math.min(overlapTop, overlapBottom);

        if (minV < minH) {
          if (overlapTop < overlapBottom) {
            player.y = obs.y - player.h;
            player.vy = 0;
            player.onGround = true;
          } else {
            player.y = obs.y + obs.h;
            player.vy = Math.abs(player.vy) * 0.1;
          }
        } else {
          if (overlapLeft < overlapRight) {
            player.x = obs.x - player.w;
            player.vx = 0;
          } else {
            player.x = obs.x + obs.w;
            player.vx = 0;
          }
        }
      }
    }

    if (player.x < 30) player.x = 30;

    const targetCamX = player.x - BASE_W * 0.35;
    cameraX = Math.max(0, Math.min(WORLD_W - BASE_W, targetCamX));

    if (Math.abs(player.vx) > 0.2 && player.onGround) {
      player.walkTimer += dt;
      if (player.walkTimer > 80) { player.walkFrame++; player.walkTimer = 0; }
    }

    player.squash += (1 - player.squash) * 0.15;
    player.stretch += (1 - player.stretch) * 0.15;

    progress = Math.min(1, player.x / (WORLD_W - 150));

    for (const trig of triggers) {
      if (!trig.fired && player.x > trig.x) {
        trig.fired = true;
        showDialogue(trig.text);
        dlgHideTimer = 0;
      }
    }

    if (dlgActive && dlgDone) {
      dlgHideTimer += dt;
      if (dlgHideTimer > 2800) hideDialogue();
    }

    if (player.x > npc.x - 50 && !endShown) {
      movementLocked = true;
      endShown = true;
      player.vx = 0;
      player.vy = 0;
      hideDialogue();
      showEndScreen();
    }

    heartAnim += dt * 0.05;
  }

  // ---- DRAW ----
  const { barnAlpha, forestAlpha, twilightAlpha } = getSceneBlends();

  ctx.clearRect(0, 0, BASE_W, BASE_H);

  if (barnAlpha > 0) drawBarnBg(cameraX, barnAlpha);
  if (forestAlpha > 0) drawForestBg(cameraX, forestAlpha);
  if (twilightAlpha > 0) drawTwilightBg(cameraX, twilightAlpha);

  ctx.save();
  ctx.translate(-Math.round(cameraX), 0);

  for (const d of barnDecor) {
    const sx = d.x - cameraX;
    if (sx > -80 && sx < BASE_W + 80) {
      switch (d.type) {
        case 'crate': drawCrate(d.x, d.y, d.w, d.h); break;
        case 'barrel': drawBarrel(d.x, d.y, d.w, d.h); break;
        case 'lamp': drawLamp(d.x, d.y); break;
        case 'window': drawWindow(d.x, d.y, d.w, d.h); break;
        case 'ladder': drawLadder(d.x, d.y, d.h); break;
        case 'pitchfork': drawPitchfork(d.x, d.y); break;
        case 'sack': drawSack(d.x, d.y, d.w, d.h); break;
      }
    }
  }

  for (const p of platforms) {
    const sx = p.x - cameraX;
    if (sx > -80 && sx < BASE_W + 80) {
      if (p.type === 'crate2') {
        drawCrate(p.x, p.y + 16, 32, 16);
        drawCrate(p.x, p.y, 32, 16);
      } else if (p.type === 'barrel3') {
        drawBarrel(p.x, p.y + 32, 16, 16);
        drawBarrel(p.x, p.y + 16, 16, 16);
        drawBarrel(p.x, p.y, 16, 16);
      }
    }
  }

  {
    const sx = puddle.x - cameraX;
    if (sx > -60 && sx < BASE_W + 60) {
      drawPuddle(puddle.x, puddle.y);
      drawHeart(puddle.x + 12, puddle.y - 20, heartAnim);
    }
  }

  ctx.restore();
  drawGround(cameraX, barnAlpha > 0 ? 1 - barnAlpha : (forestAlpha > 0 ? forestAlpha : 0), twilightAlpha);

  ctx.save();
  ctx.translate(-Math.round(cameraX), 0);

  {
    const sx = tree.x - cameraX;
    if (sx > -150 && sx < BASE_W + 80) {
      drawBigTree(tree.x, tree.y);
      drawEmoGuy(npc.x, npc.y);
    }
  }

  if (forestAlpha > 0 || twilightAlpha > 0) {
    const startX = 800, endX = WORLD_W - 200;
    for (let tx = startX; tx < endX; tx += 180) {
      const sx = tx - cameraX;
      if (sx > -60 && sx < BASE_W + 60) {
        ctx.globalAlpha = Math.max(forestAlpha, twilightAlpha);
        ctx.fillStyle = twilightAlpha > 0.5 ? '#1a3a10' : C.tree;
        ctx.fillRect(tx + 12, GROUND_Y - 70, 16, 70);
        ctx.fillRect(tx, GROUND_Y - 100, 40, 55);
        ctx.fillRect(tx + 6, GROUND_Y - 120, 28, 35);
        ctx.globalAlpha = 1;
      }
    }
  }

  ctx.globalAlpha = 1;
  drawPig(player.x, player.y + player.h, player.walkFrame, player.squash, player.stretch, player.onGround);

  ctx.restore();

  drawUI();

  if (progress < 0.05) {
    drawHintBox(BASE_W / 2 - 55, 30, '← MOVE LEFT', '← key / left zone');
    drawHintBox(BASE_W / 2 - 55, 80, 'MOVE RIGHT →', '→ key / right zone');
  }

  requestAnimationFrame(render);
}

function drawHintBox(x, y, title, sub) {
  px(x, y, 110, 40, C.uiBg);
  px(x - 2, y - 2, 114, 44, C.uiBorder);
  px(x, y, 110, 40, C.uiBg);
  ctx.fillStyle = '#2a1200';
  ctx.font = 'bold 8px monospace';
  ctx.fillText(title, x + 8, y + 14);
  ctx.font = '7px monospace';
  ctx.fillStyle = '#5a2a10';
  ctx.fillText(sub, x + 6, y + 28);
}

function drawUI() {
  px(2, 2, 110, 44, 'rgba(0,0,0,0.45)');
  drawPigHeadUI(4, 4);
  drawBaconBar(26, 8, 82, progress, C.barPink, C.barDarkPink);
}

// ---- EVENT HANDLERS ----
document.getElementById('yesBtn').addEventListener('click', showHeartScreen);
document.getElementById('heckYesBtn').addEventListener('click', showHeartScreen);
document.getElementById('restartBtn').addEventListener('click', () => {
  location.reload();
});

// ---- CONTROLS ----
document.addEventListener('keydown', (e) => {
  if (e.code === 'ArrowRight') keys.right = true;
  if (e.code === 'ArrowLeft') keys.left = true;
  if (e.code === 'Space' || e.code === 'KeyZ') { keys.jump = true; e.preventDefault(); }
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'ArrowRight') keys.right = false;
  if (e.code === 'ArrowLeft') keys.left = false;
  if (e.code === 'Space' || e.code === 'KeyZ') keys.jump = false;
});

// Mobile controls
const jumpZone = document.getElementById('jumpZone');
const leftMoveZone = document.getElementById('moveLeftZone');
const rightMoveZone = document.getElementById('moveRightZone');
if (jumpZone) jumpZone.addEventListener('touchstart', (e) => { e.preventDefault(); keys.jump = true; }, { passive: false });
if (jumpZone) jumpZone.addEventListener('touchend', (e) => { e.preventDefault(); keys.jump = false; }, { passive: false });
if (leftMoveZone) leftMoveZone.addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; }, { passive: false });
if (leftMoveZone) leftMoveZone.addEventListener('touchend', (e) => { e.preventDefault(); keys.left = false; }, { passive: false });
if (rightMoveZone) rightMoveZone.addEventListener('touchstart', (e) => { e.preventDefault(); keys.right = true; }, { passive: false });
if (rightMoveZone) rightMoveZone.addEventListener('touchend', (e) => { e.preventDefault(); keys.right = false; }, { passive: false });

canvas.addEventListener('touchstart', (e) => {
  for (const touch of e.changedTouches) {
    const canvasRect = canvas.getBoundingClientRect();
    const tx = touch.clientX - canvasRect.left;
    if (tx < canvasRect.width / 2) { keys.jump = true; }
    else { keys.right = true; }
  }
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', (e) => {
  let hasLeft = false, hasRight = false;
  for (const touch of e.touches) {
    const canvasRect = canvas.getBoundingClientRect();
    const tx = touch.clientX - canvasRect.left;
    if (tx < canvasRect.width / 2) hasLeft = true;
    else hasRight = true;
  }
  if (!hasLeft) keys.jump = false;
  if (!hasRight) keys.right = false;
  e.preventDefault();
}, { passive: false });

// ---- START ----
requestAnimationFrame((ts) => { lastTime = ts; requestAnimationFrame(render); });
</script>
